<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0b0e;
      color: #eef1f6;
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 14px;
    }
    .card {
      background: #14171c;
      border: 1px solid #272c36;
      border-radius: 10px;
      padding: 32px 40px;
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 18px; font-weight: 600; color: #eef1f6; margin: 0 0 12px; }
    p { color: #8a909c; margin: 0 0 20px; line-height: 1.5; }
    code {
      font-family: 'JetBrains Mono', monospace;
      background: #1a1e25;
      border: 1px solid #272c36;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12.5px;
      color: #c6ccd6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Market AI SPA</h1>
    <p>The React SPA has not been built yet.</p>
    <p>Run <code>pnpm build</code> inside <code>frontend/</code> to compile it, then reload.</p>
  </div>
</body>
</html>
