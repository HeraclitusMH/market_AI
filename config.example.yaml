mode: PAPER  # PAPER or LIVE

ibkr:
  host: "127.0.0.1"
  port: 7497          # 7497 = TWS paper, 4002 = Gateway paper
  client_id: 1
  account: ""         # leave blank to auto-detect
  # 1=Live, 2=Frozen, 3=Delayed, 4=Delayed-Frozen.
  # Paper accounts without market-data subscriptions should use 3 (default).
  market_data_type: 3

db:
  # Postgres (recommended): set DATABASE_URL env var or uncomment url below.
  # url: "postgresql+psycopg://market_ai:market_ai_pass@localhost:5432/market_ai"
  # SQLite fallback (dev/test only):
  path: "app.db"

scheduling:
  sentiment_refresh_minutes: 60      # legacy — used when sentiment.refresh_minutes is absent
  signal_eval_minutes: 15
  rebalance_time_local: "09:45"      # HH:MM in local time

universe:
  min_mcap: 1_000_000_000        # $1B
  min_dollar_volume: 10_000_000  # $10M avg daily
  min_price: 5.0
  exclude_leveraged_etfs: true
  max_spread_pct: 0.5

strategy:
  weights:
    trend: 0.35
    momentum: 0.25
    volatility: 0.15
    sentiment: 0.25
  regime:
    vol_threshold: 25.0           # annualised vol %
  timeframes:
    - "1D"
    - "1H"
  max_holding_days: 20

options:
  enabled: true
  dte_min: 7
  dte_max: 21
  min_open_interest: 100
  max_option_spread_pct: 10.0
  max_spread_width: 5            # max strike distance in $
  # Planner expiry selection (canonical; ranking.dte_* kept for backward compat)
  planner_dte_min: 21
  planner_dte_max: 45
  planner_dte_target: 30         # aim for this DTE
  planner_dte_fallback_min: 14   # fallback floor when nothing in primary range

risk:
  max_drawdown_pct: 50
  max_risk_per_trade_pct: 5
  max_positions: 5
  require_positive_cash: true

execution:
  order_type: "LIMIT"
  tif: "DAY"
  fill_timeout_seconds: 120
  requote_attempts: 2

safety:
  data_stale_minutes: 15
  trade_when_stale: false

features:
  approve_mode_default: true      # start in approve mode for safety

dry_run: false                     # true = generate plans but never submit orders (overrides approve_mode)

bots:
  options_swing:
    enabled: true                  # set false to disable the options bot entirely

  equity_swing:
    enabled: true                  # set false to disable the equity bot entirely
    long_only: true                # v1: no shorting
    long_entry_threshold: 0.55     # swing score >= this to enter a long
    exit_threshold: 0.45           # score drops below this → exit signal
    max_positions: 5               # equity_swing portfolio cap (independent of options)
    risk_per_trade_pct: 1.0        # % of NAV risked per equity position
    atr_stop_multiplier: 2.0       # stop = entry - atr_stop_multiplier * ATR(14)
    atr_period: 14
    max_holding_days: 20
    min_avg_daily_volume: 1_000_000
    max_sector_concentration: 0.30 # max 30% of NAV in any single GICS sector
    entry_order_type: "LIMIT"      # LIMIT or MARKET
    risk_off_mode: "cash"          # "cash" = no new longs | "defensive" = utilities/staples only
    defensive_sectors:
      - "Utilities"
      - "Consumer Staples"

ranking:
  # Sentiment sub-weights (market / sector / ticker components)
  w_market: 0.20
  w_sector: 0.30
  w_ticker: 0.50
  # Composite factor weights (redistribute proportionally when a factor is missing).
  # Liquidity is an eligibility gate only and does not contribute to score.
  w_sentiment: 0.30
  w_momentum_trend: 0.25
  w_risk: 0.20
  w_fundamentals: 0.10
  # Selection thresholds (0..1 scale matching composite score)
  enter_threshold: 0.55            # score >= this → bullish; (1-threshold) → bearish
  max_candidates_total: 3
  fallback_trade_broad_etf: false
  # Cadence controls
  cooldown_hours: 6
  max_trades_per_day: 3
  # Liquidity floor (USD avg daily dollar volume)
  min_dollar_volume: 20_000_000
  # IBKR contract verification cache TTL
  contract_cache_hours: 24
  # Deprecated: planner DTE now lives in options.planner_dte_*; kept for backward compat
  dte_min: 21
  dte_max: 45
  dte_target: 30
  dte_fallback_min: 14

scoring:
  config_path: "trader/composite_scorer/config/scoring_config.yaml"
  use_cache: false

fundamentals:
  enabled: true         # set false to disable yfinance fundamental scoring
  ttl_days: 7           # DB cache TTL in days; rows older than this are recomputed
  cache_ttl_hours: 24   # in-process cache TTL (intra-run dedup of yfinance calls)
  refresh_days: 7       # scheduler bulk-refresh cadence (every symbol in the universe)
  provider: "yfinance"
  request_timeout_seconds: 15
  neutral_score: 50
  min_coverage: 0.2     # min fraction of universe with data for cross-sectional scoring
  pillar_weights:
    valuation: 0.25
    profitability: 0.30
    growth: 0.25
    financial_health: 0.20
  metric_bounds:
    PEEXCLXOR:       { worst: 40,   best: 5    }
    PRICE2BK:        { worst: 8,    best: 0.5  }
    EVCUR2EBITDA:    { worst: 25,   best: 5    }
    PRICE2SALESTTM:  { worst: 15,   best: 0.5  }
    TTMROEPCT:       { worst: -5,   best: 30   }
    TTMROAPCT:       { worst: -3,   best: 15   }
    TTMGROSMGN:      { worst: 10,   best: 60   }
    TTMNPMGN:        { worst: -5,   best: 25   }
    REVCHNGYR:       { worst: -10,  best: 30   }
    EPSCHNGYR:       { worst: -20,  best: 40   }
    REVTRENDGR:      { worst: -5,   best: 25   }
    QCURRATIO:       { worst: 0.5,  best: 3.0  }
    QQUICKRATI:      { worst: 0.3,  best: 2.5  }
    QTOTD2EQ:        { worst: 3.0,  best: 0.0  }
  pillars:
    valuation:
      weight: 0.25
      metrics: [PEEXCLXOR, PRICE2BK, EVCUR2EBITDA, PRICE2SALESTTM]
    profitability:
      weight: 0.30
      metrics: [TTMROEPCT, TTMROAPCT, TTMGROSMGN, TTMNPMGN]
    growth:
      weight: 0.25
      metrics: [REVCHNGYR, EPSCHNGYR, REVTRENDGR]
    financial_health:
      weight: 0.20
      metrics: [QCURRATIO, QQUICKRATI, QTOTD2EQ]

exits:
  enabled: true
  check_frequency: "every_cycle"   # "every_cycle" | "hourly" | "daily_close"

  equity:
    trailing_stop_enabled: true
    initial_stop_method: "atr"          # "atr" | "percent" | "support_level"
    atr_stop_multiplier: 2.0
    trailing_activation_r: 1.0          # start trailing after position is +1R
    trailing_method: "atr"              # "atr" | "percent" | "highest_close"
    trailing_atr_multiplier: 1.5
    trailing_percent: 0.05
    stop_never_moves_down: true
    max_holding_days: 20
    time_decay_warning_days: 15
    profit_target_enabled: true
    profit_target_r: 3.0
    partial_profit_enabled: true
    partial_profit_r: 2.0
    partial_profit_pct: 0.50
    score_exit_enabled: true
    score_exit_threshold: 0.40
    score_exit_consecutive_cycles: 2
    regime_exit_enabled: true
    regime_exit_action: "tighten"       # "tighten" | "close"
    regime_tighten_atr_multiplier: 1.0
    sector_exit_on_sentiment_flip: false

  options:
    dte_exit_threshold: 7
    dte_warning_threshold: 14
    profit_target_pct: 0.50
    profit_target_aggressive_pct: 0.75
    max_loss_exit_pct: 0.80
    max_loss_floor_pct: 1.00
    time_decay_exit_enabled: true
    theta_bleed_threshold: 0.60
    score_exit_enabled: true
    score_exit_threshold: 0.40
    score_exit_consecutive_cycles: 2
    regime_exit_enabled: true
    regime_exit_action: "close"
    delta_drift_exit_enabled: true
    max_delta_drift: 0.15
    iv_crush_exit_enabled: true
    iv_crush_threshold: 0.30

sentiment:
  provider: "rss_lexicon"         # rss_lexicon | claude_llm
  refresh_minutes: 60

  rss:
    feeds:
      - "https://feeds.reuters.com/reuters/businessNews"
      - "https://feeds.reuters.com/reuters/marketsNews"
      - "https://www.cnbc.com/id/100003114/device/rss/rss.html"
      - "https://www.cnbc.com/id/15839135/device/rss/rss.html"
      - "https://www.ft.com/rss/home"
      - "https://www.economist.com/rss/the-world-this-week.xml"
      - "https://seekingalpha.com/market_currents.xml"
      - "http://feeds.marketwatch.com/marketwatch/topstories/"
      - "https://www.federalreserve.gov/feeds/press_all.xml"
      - "https://finance.yahoo.com/rss/"
    user_agent: "MarketAI/1.0 (+https://local)"
    request_timeout_seconds: 20
    max_items_per_run: 200

  claude:
    enabled: true
    model: "claude-3-5-sonnet-latest"
    api_key_env: "ANTHROPIC_API_KEY"     # NEVER put the key itself in YAML
    temperature: 0.2
    request_timeout_seconds: 45
    max_retries: 3
    backoff_base_seconds: 2
    backoff_max_seconds: 30

    # Input/output sizing
    max_items_per_run: 40
    max_chars_per_item: 600
    max_output_tokens: 4000

    # Dedup
    dedup_cache_days: 14

    # Quality filters
    min_confidence_to_use: 0.35

    # Budget hard-cap (sentiment-only)
    monthly_budget_eur: 10.0
    eur_usd_rate: 1.08
    hard_stop_on_budget: true
    daily_budget_fraction: 0.12
    max_tokens_per_item_estimate: 300

regime:
  enabled: true
  trend_symbol: "SPY"
  volatility_symbol: "VIX"
  credit_stress_symbols:
    high_yield: "HYG"
    investment_grade: "LQD"
  weights:
    trend: 0.30
    breadth: 0.25
    volatility: 0.25
    credit_stress: 0.20
  trend:
    sma_period: 200
    ema_fast: 20
    ema_slow: 50
  breadth:
    ma_period: 50
    strong_threshold: 0.70
    moderate_threshold: 0.50
    weak_threshold: 0.30
    min_symbols_required: 20
    use_universe: true
  volatility:
    realized_vol_period: 20
    vix_low: 15.0
    vix_moderate: 20.0
    vix_elevated: 25.0
    vix_high: 30.0
    realized_vol_low: 12.0
    realized_vol_moderate: 18.0
    realized_vol_elevated: 25.0
  credit_stress:
    lookback_days: 20
    ratio_sma_period: 50
    mild_deviation_pct: 0.02
    severe_deviation_pct: 0.05
  thresholds:
    risk_on_min: 65
    risk_off_max: 35
  hysteresis:
    degrade_confirmations: 2
    recover_confirmations: 3
    min_hold_cycles: 1
  effects:
    risk_on:
      sizing_factor: 1.0
      allows_new_equity_entries: true
      allows_new_options_entries: true
      stop_tightening_factor: 1.0
      score_threshold_adjustment: 0.0
    risk_reduced:
      sizing_factor: 0.50
      allows_new_equity_entries: true
      allows_new_options_entries: false
      stop_tightening_factor: 0.75
      score_threshold_adjustment: 0.10
    risk_off:
      sizing_factor: 0.0
      allows_new_equity_entries: false
      allows_new_options_entries: false
      stop_tightening_factor: 0.50
      score_threshold_adjustment: 0.20
  fallback:
    on_insufficient_data: "risk_reduced"
    on_ibkr_offline: "risk_reduced"
